name: Ingest to Supabase

on:
  schedule:
    - cron: "0 */6 * * *" # safety net every 6 hours
  workflow_dispatch: {}
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    # Only run for [hackathon] / [lfg] issues; always run for schedule / manual dispatch.
    if: |
      github.event_name != 'issues' ||
      contains(github.event.issue.title, '[hackathon]') ||
      contains(github.event.issue.title, '[lfg]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run ingest
        working-directory: web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ingest.mjs
