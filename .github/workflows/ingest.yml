name: Ingest to Supabase

on:
  schedule:
    - cron: "0 */6 * * *" # safety net every 6 hours
  workflow_dispatch: {}
  issues:
    types: [opened, edited, reopened, closed, labeled, unlabeled]

permissions:
  contents: read
  issues: read

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    # Only run for [hackathon] / [lfg] issues; always run for schedule / manual dispatch.
    if: |
      github.event_name != 'issues' ||
      contains(github.event.issue.title, '[hackathon]') ||
      contains(github.event.issue.title, '[lfg]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: latest

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run ingest
        working-directory: web
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/ingest.mjs
